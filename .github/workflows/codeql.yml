name: "CodeQL Analysis"

on:
  push:
    paths-ignore:
      - '**.md'
      - 'LICENSE'

jobs:
  codeql:
    runs-on: windows-2022
    permissions:
      security-events: write
    steps:
      - name: Check out repository code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: microsoft/Windows-Driver-Developer-Supplemental-Tools/config/codeql-config.yml@development
          packs: +microsoft/windows-drivers@1.2.0-beta

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build solution
        run: |
          msbuild FrameworkSensors\FrameworkSensors.sln /property:Configuration=Release /property:Platform=x64

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{matrix.language}}"
